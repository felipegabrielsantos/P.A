<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body {
            margin: 0;
        }
        p {
            font-size: 20vh;
            text-shadow: -5px 0px 0px #ff0000, 5px 0px 0px #0044ff, 0px -5px 0px #00ff00, 0px 5px 0px #ffff00;
            transition: text-shadow 3s ease-in-out;
        }
        p:hover {
            text-shadow: 5px 0px 0px #ff0000, -5px 0px 0px #0044ff;
            transition: text-shadow 3s ease-in-out;
        }
    </style>
</head>
<body>
    <div>
        <p>
            Não sei :)
        </p>
    </div>
</body>
</html>
